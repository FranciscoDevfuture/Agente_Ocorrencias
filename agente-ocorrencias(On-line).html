<!DOCTYPE html>
<html lang="pt-BR">
<head>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d0f14; color: #c8cdd8; font-family: 'IBM Plex Sans', sans-serif; min-height: 100vh; }
  .app { max-width: 720px; margin: 0 auto; padding: 24px 16px 48px; }
  .header { border-bottom: 1px solid #1e2330; padding-bottom: 20px; margin-bottom: 28px; }

  .header-badge { display: inline-flex; align-items: center; gap: 6px; background: #ff3b3b18; border: 1px solid #ff3b3b44; color: #ff6b6b; font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; padding: 4px 10px; border-radius: 2px; margin-bottom: 12px; }

  .btn-historico { background:none; border:1px solid #1e2330; color:#5a6278; border-radius:4px; padding:8px 14px; font-size:12px; font-family:'IBM Plex Mono',monospace; cursor:pointer; white-space:nowrap; transition:all 0.15s; }
  .btn-historico:hover { border-color:#4d8eff; color:#4d8eff; }
  .btn-historico.ativo { border-color:#4d8eff; color:#4d8eff; background:#0d1a33; }
  .step-nav { display:flex; margin-bottom:28px; border:1px solid #1e2330; border-radius:4px; overflow:hidden; }

  .step-pill:last-child { border-right:none; }
  .step-pill.done { color:#2a8a5a; background:#0d2018; }
  .step-pill.active { color:#4d8eff; background:#0d1a33; font-weight:600; }
  .card { background:#111420; border:1px solid #1e2330; border-radius:6px; padding:24px; margin-bottom:20px; }
  .card-title { font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:600; color:#4d8eff; letter-spacing:2px; text-transform:uppercase; margin-bottom:20px; display:flex; align-items:center; gap:8px; }
  .card-title::after { content:''; flex:1; height:1px; background:#1e2330; }
  .field { margin-bottom:16px; }
  .field label { display:block; font-size:11px; font-weight:500; color:#7a8299; margin-bottom:6px; text-transform:uppercase; letter-spacing:0.8px; }
  .hint { font-size:11px; color:#3a4a5a; margin-bottom:6px; font-style:italic; display:block; }
  input, textarea { width:100%; background:#0d0f14; border:1px solid #1e2330; border-radius:4px; color:#c8cdd8; font-family:'IBM Plex Sans',sans-serif; font-size:14px; padding:10px 12px; transition:border-color 0.2s; outline:none; }
  input:focus, textarea:focus { border-color:#4d8eff; }
  input::placeholder, textarea::placeholder { color:#2e3348; }
  textarea { resize:vertical; line-height:1.6; }
  .row-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .radio-group { display:flex; gap:8px; flex-wrap:wrap; }
  .radio-btn { padding:8px 16px; background:#0d0f14; border:1px solid #1e2330; border-radius:4px; color:#5a6278; font-size:13px; cursor:pointer; transition:all 0.15s; font-family:'IBM Plex Sans',sans-serif; }
  .radio-btn:hover { border-color:#2e3a55; color:#8a93aa; }
  .radio-btn.active { background:#0d1a33; border-color:#4d8eff; color:#4d8eff; }
  .radio-btn.danger { border-color:#ff3b3b44; color:#cc4444; }
  .radio-btn.danger.active { background:#1a0d0d; border-color:#ff3b3b; color:#ff6b6b; }
  .dynamic-list { display:flex; flex-direction:column; gap:12px; }
  .list-item { background:#0d0f14; border:1px solid #1e2330; border-radius:4px; padding:14px; }
  .list-item-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; font-family:'IBM Plex Mono',monospace; font-size:11px; color:#3a4055; }
  .list-item-fields { display:grid; gap:10px; }
  .list-item .field { margin-bottom:0; }
  .remove-btn { background:none; border:1px solid #3a2222; color:#7a3a3a; border-radius:3px; width:22px; height:22px; cursor:pointer; font-size:10px; }
  .add-btn { background:none; border:1px dashed #1e2330; color:#3a4a6a; border-radius:4px; padding:9px; width:100%; cursor:pointer; font-size:12px; font-family:'IBM Plex Mono',monospace; transition:all 0.15s; }
  .add-btn:hover { border-color:#4d8eff; color:#4d8eff; }
  .nav { display:flex; justify-content:space-between; gap:12px; }
  .btn { padding:11px 24px; border-radius:4px; font-size:13px; font-weight:500; cursor:pointer; transition:all 0.15s; border:none; font-family:'IBM Plex Sans',sans-serif; }
  .btn-ghost { background:none; border:1px solid #1e2330; color:#5a6278; }
  .btn-ghost:hover { border-color:#2e3a55; color:#8a93aa; }
  .btn-ghost:disabled { opacity:0.3; cursor:not-allowed; }
  .btn-primary { background:#4d8eff; color:#fff; }
  .btn-primary:hover { background:#6a9fff; }
  .btn-primary:disabled { background:#1a2440; color:#2e3a55; cursor:not-allowed; }
  .btn-gerar { background:#1a3a5a; color:#fff; width:100%; padding:13px; font-size:14px; font-weight:600; border:none; border-radius:4px; cursor:pointer; transition:background 0.15s; }
  .btn-gerar:hover { background:#1e4a72; }
  .loading { display:flex; align-items:center; gap:10px; color:#4d8eff; font-family:'IBM Plex Mono',monospace; font-size:12px; padding:20px 0; }
  .spinner { width:16px; height:16px; border:2px solid #1e2330; border-top-color:#4d8eff; border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .relatorio-edit-wrap { position:relative; margin:16px 0; }
  .relatorio-textarea { width:100%; background:#0d0f14; border:1px solid #2a3a2a; border-radius:4px; padding:20px; font-size:14px; line-height:1.9; color:#c8cdd8; font-family:'IBM Plex Sans',sans-serif; resize:vertical; outline:none; min-height:220px; transition:border-color 0.2s; }
  .relatorio-textarea:focus { border-color:#4d8eff; }
  .edit-badge { position:absolute; top:10px; right:10px; font-family:'IBM Plex Mono',monospace; font-size:10px; color:#3a4055; background:#111420; border:1px solid #1e2330; padding:2px 8px; border-radius:2px; pointer-events:none; }
  .action-bar { display:flex; justify-content:flex-end; gap:10px; flex-wrap:wrap; margin-top:4px; }
  .btn-copy { background:#0d2018; border:1px solid #2a8a5a; color:#4ac97a; padding:9px 16px; border-radius:4px; font-size:12px; font-family:'IBM Plex Mono',monospace; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .btn-pdf { background:#1a1a3a; border:1px solid #4d4dff44; color:#8888ff; padding:9px 16px; border-radius:4px; font-size:12px; font-family:'IBM Plex Mono',monospace; cursor:pointer; }
  .btn-reset { background:none; border:1px solid #1e2330; color:#5a6278; padding:9px 16px; border-radius:4px; font-size:12px; font-family:'IBM Plex Mono',monospace; cursor:pointer; }
  .samu-section { border-top:1px solid #1e2330; padding-top:20px; margin-top:4px; }
  .api-key-box { background:#111420; border:1px solid #4d8eff33; border-radius:6px; padding:20px; margin-bottom:20px; }
  .api-key-box p { font-size:13px; color:#7a8299; margin-bottom:12px; line-height:1.7; }
  .api-key-box a { color:#4d8eff; }
  .key-row { display:flex; gap:8px; }
  .key-row input { font-family:'IBM Plex Mono',monospace; font-size:12px; }
  .btn-save { background:#4d8eff; color:#fff; border:none; border-radius:4px; padding:10px 18px; font-size:13px; cursor:pointer; white-space:nowrap; }
  .btn-save:disabled { background:#1a2440; color:#2e3a55; cursor:not-allowed; }
  .key-change { font-size:11px; color:#3a4a6a; cursor:pointer; font-family:'IBM Plex Mono',monospace; background:none; border:none; text-decoration:underline; margin-bottom:16px; display:block; }
  .terminal-bar { background:#0d1220; border:1px solid #1e2a3a; border-radius:4px; padding:12px 16px; margin-bottom:20px; display:flex; align-items:center; gap:12px; }
  .terminal-bar label { font-size:11px; color:#4d6a8a; font-family:'IBM Plex Mono',monospace; white-space:nowrap; text-transform:uppercase; letter-spacing:1px; }
  .terminal-bar input { background:transparent; border:none; border-bottom:1px solid #1e2a3a; border-radius:0; padding:4px 0; font-size:13px; color:#8ab4ff; font-family:'IBM Plex Mono',monospace; }
  .terminal-bar input:focus { border-bottom-color:#4d8eff; outline:none; }
  .alerta-inconsciente { background:#1a0d0d; border:1px solid #ff3b3b44; border-radius:4px; padding:12px 14px; margin-bottom:16px; font-size:13px; color:#ff8888; line-height:1.6; }
  .alerta-inconsciente strong { color:#ff6b6b; }
  .erro { color:#ff6b6b; font-size:13px; padding:12px; background:#1a0d0d; border:1px solid #ff3b3b44; border-radius:4px; margin-top:12px; line-height:1.6; }
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#1a4a2a; border:1px solid #2a8a5a; color:#4ac97a; font-family:'IBM Plex Mono',monospace; font-size:13px; padding:10px 24px; border-radius:6px; z-index:999; animation:fadeup 0.2s ease; pointer-events:none; white-space:nowrap; }
  @keyframes fadeup { from{opacity:0;transform:translateX(-50%) translateY(8px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
  .hist-vazio { text-align:center; padding:32px; color:#3a4055; font-family:'IBM Plex Mono',monospace; font-size:13px; }
  .hist-item { background:#0d0f14; border:1px solid #1e2330; border-radius:4px; padding:16px; margin-bottom:12px; }
  .hist-item-header { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; margin-bottom:8px; }
  .hist-item-nome { font-weight:600; color:#eef0f6; font-size:14px; }
  .hist-item-data { font-family:'IBM Plex Mono',monospace; font-size:10px; color:#3a4055; white-space:nowrap; }
  .hist-item-meta { font-size:12px; color:#5a6278; }
  .hist-item-actions { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
  .btn-hist-ver { background:#0d1a33; border:1px solid #2a4a6a; color:#4d8eff; padding:6px 12px; border-radius:3px; font-size:11px; font-family:'IBM Plex Mono',monospace; cursor:pointer; }
  .btn-hist-del { background:none; border:1px solid #3a2222; color:#7a3a3a; padding:6px 12px; border-radius:3px; font-size:11px; font-family:'IBM Plex Mono',monospace; cursor:pointer; }
  .hist-count { font-family:'IBM Plex Mono',monospace; font-size:11px; color:#3a4055; margin-bottom:16px; }
  .modal-overlay { position:fixed; inset:0; background:#00000099; z-index:100; display:flex; align-items:center; justify-content:center; padding:16px; }
  .modal { background:#111420; border:1px solid #1e2330; border-radius:8px; max-width:680px; width:100%; max-height:90vh; overflow-y:auto; padding:24px; }
  .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
  .modal-title { font-family:'IBM Plex Mono',monospace; font-size:12px; color:#4d8eff; font-weight:600; letter-spacing:1px; }
  .modal-close { background:none; border:1px solid #1e2330; color:#5a6278; border-radius:3px; width:28px; height:28px; cursor:pointer; font-size:14px; }
  @media(max-width:540px){ .row-2{grid-template-columns:1fr} .step-pill{font-size:8px;padding:6px 2px} .action-bar{flex-direction:column} .action-bar button{width:100%;text-align:center;} }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const STEPS = ["Dados do Usuário","Estado Clínico","Equipe de Atendimento","SAMU","Desfecho & Cientes","Relatório Final"];
const HIST_KEY = "ocorrencias_historico";
const TERM_KEY = "ocorrencias_terminal";
const GROQ_KEY = "groq_key";

const emptyForm = () => ({
  horarioOcorrencia:"", nomeUsuario:"", rgUsuario:"", cpfUsuario:"", idadeUsuario:"",
  localOcorrencia:"", quemChamou:"",
  sinaisVitais:"", situacaoUsuario:"", precisaCadeira:"nao", consciente:"sim",
  nivelConsciente:"", aceitaConducao:"sim", hospitalDestino:"",
  equipe:[{nome:"",cargo:"",re:""}],
  samuSolicitado:"nao", horarioSamuContato:"", atendenteSamu:"", protocoloSamu:"",
  horarioChegadaSamu:"", horarioSaidaSamu:"", placaAmbu:"", prefixoAmbu:"",
  equipeSamu:[{nome:"",funcao:"",recrea:""}],
  horarioFinalizacao:"", cientes:[{nome:"",cargo:"",re:""}], observacoesFinais:"",
});

function carregarHistorico() {
  try { return JSON.parse(localStorage.getItem(HIST_KEY)) || []; } catch { return []; }
}
function salvarHistorico(lista) { localStorage.setItem(HIST_KEY, JSON.stringify(lista)); }

async function copiarTexto(texto) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    try { await navigator.clipboard.writeText(texto); return true; } catch {}
  }
  const ta = document.createElement("textarea");
  ta.value = texto;
  ta.setAttribute("readonly","");
  ta.style.cssText = "position:fixed;top:0;left:0;opacity:0;";
  document.body.appendChild(ta);
  ta.focus(); ta.select(); ta.setSelectionRange(0,99999);
  const ok = document.execCommand("copy");
  document.body.removeChild(ta);
  return ok;
}

async function gerarComGroq(apiKey, form, terminal) {
  const inconsciente = form.consciente === "nao";

  const prompt = `Você é um agente especializado em redigir relatórios de ocorrências de mal súbito em terminais de transporte público.

Redija um relatório formal em português, em parágrafos corridos, sem listas, sem markdown, sem asteriscos e sem títulos. Use linguagem institucional, objetiva e juridicamente segura.

REGRAS OBRIGATÓRIAS:
1. Nunca afirme diagnósticos médicos. Use "relatando", "queixando-se de", "apresentando" para sintomas referidos pelo usuário consciente.
2. Se o usuário estiver INCONSCIENTE: use apenas linguagem observacional dos colaboradores ("foi encontrado", "apresentava", "os colaboradores observaram"). Nunca use "queixando-se" para inconscientes.
3. Se o usuário estiver INCONSCIENTE: NÃO mencione aceite ou recusa de condução — ele não pode consentir.
4. Não mencione a idade no corpo do texto salvo se relevante.
5. Não inclua CPF no texto (LGPD).
6. Use "aceitou ser conduzido" (nunca "aceitando condução").
7. Se sinais vitais não foram aferidos, registre: "não foram aferidos os sinais vitais do usuário."
8. Seja objetivo e direto. Evite repetições no encerramento.
9. Para inconsciente: o acionamento do SAMU deve ser tratado como medida imediata e necessária.

${terminal ? `TERMINAL: ${terminal}` : ""}
ESTADO DE CONSCIÊNCIA: ${inconsciente ? "INCONSCIENTE — usuário sem resposta" : "CONSCIENTE"}

DADOS:
- Horário: ${form.horarioOcorrencia}
- Nome: ${form.nomeUsuario}
- RG: ${form.rgUsuario || "não informado"}
- Local: ${form.localOcorrencia}
- Como identificado: ${form.quemChamou || "não informado"}

ESTADO CLÍNICO:
- ${inconsciente ? "Observações dos colaboradores" : "Situação relatada/observada"}: ${form.situacaoUsuario}
- Sinais vitais: ${form.sinaisVitais || "não aferidos"}
- Cadeira de rodas: ${form.precisaCadeira === "sim" ? "Sim, necessária" : "Não necessária"}
${!inconsciente ? `- Nível de consciência: ${form.nivelConsciente || "consciente e orientado"}
- Aceita condução: ${form.aceitaConducao === "sim" ? "Sim" : form.aceitaConducao === "nao" ? "Não, recusou" : "N/A"}` : "- Usuário inconsciente: não há consentimento possível"}
- Destino: ${form.hospitalDestino || "não informado"}

EQUIPE:
${form.equipe.filter(e=>e.nome).map(e=>`- ${e.cargo}: ${e.nome}, RE ${e.re}`).join("\n") || "- Não informado"}

SAMU:
${form.samuSolicitado === "sim"
  ? `- Solicitado: Sim${inconsciente ? " (acionamento imediato por inconsciência)" : ""}
- Contato: ${form.horarioSamuContato}
- Atendente: ${form.atendenteSamu}
- Protocolo: ${form.protocoloSamu}
- Chegada: ${form.horarioChegadaSamu}
- Saída: ${form.horarioSaidaSamu}
- Placa: ${form.placaAmbu} | Prefixo: ${form.prefixoAmbu}
- Equipe SAMU: ${form.equipeSamu.filter(e=>e.nome).map(e=>`${e.funcao} ${e.nome}, RE/CREA ${e.recrea}`).join("; ")}`
  : "- Não solicitado"}

DESFECHO:
- Finalização: ${form.horarioFinalizacao || "não informado"}
- Observações: ${form.observacoesFinais || "nenhuma"}

CIENTES:
${form.cientes.filter(c=>c.nome).map(c=>`- ${c.cargo} ${c.nome} – RE ${c.re}`).join("\n") || "- Não informado"}

MODELO CONSCIENTE:
"Por volta das 22h00, o Sr. Marcos, portador do RG nº 9929990993, foi identificado na Plataforma 1 após relatar fortes dores abdominais.
A equipe de atendimento, composta pelos OTUs Francisco, RE 0292, e Michele, RE 0294, prestou auxílio ao usuário, encontrando-o consciente e orientado, tendo o mesmo aceitado ser conduzido. Devido ao quadro apresentado, foi necessária a utilização de cadeira de rodas para locomoção. No momento do atendimento, não foram aferidos os sinais vitais do usuário.
Diante da situação, foi realizado contato com o SAMU às 22h15, sendo o atendimento registrado pela atendente Maria, sob protocolo nº 09999333.
Às 22h25, compareceu ao local a viatura do SAMU, placa AMD-0925, prefixo AM-5645, composta pelo médico Paulo, RE/CREA 9293, e pela enfermeira Carla, RE/COREN 93944. Após avaliação no local, a equipe médica informou que o usuário seria encaminhado ao Hospital M'Boi Mirim.
O usuário foi conduzido pela equipe do SAMU ao hospital, permanecendo a ocorrência sem alterações até a saída da equipe.
Ocorrência finalizada às 22h55.
Ciente: ET Alex Sandro – RE 05."

MODELO INCONSCIENTE:
"Por volta das 03h12, o Sr. José Aparecido Lima, portador do RG nº 44.123.456-7, foi encontrado inconsciente na Plataforma 2, próximo ao acesso principal.
Os colaboradores presentes, Vigilante Rafael Souza, RE 1102, e OTU Cláudio Mendes, RE 0387, prestaram os primeiros auxílios ao usuário. No momento do atendimento, o mesmo encontrava-se inconsciente e sem resposta a estímulos verbais, apresentando respiração irregular e palidez intensa. Foram adotadas as medidas de segurança cabíveis até a chegada do suporte especializado. No momento do atendimento, não foram aferidos os sinais vitais do usuário.
Diante do estado de inconsciência apresentado, foi realizado contato imediato com o SAMU às 03h15, sendo o atendimento registrado pela atendente Patrícia, sob protocolo nº 20261102033.
Às 03h28, compareceu ao local a viatura do SAMU AM-1134, placa EKF-3391, composta pelo médico Dr. Roberto Alves, RE/CREA 88712, e pela enfermeira Tatiane Costa, RE/COREN 54923. A equipe médica assumiu os cuidados do usuário imediatamente, informando que o mesmo seria encaminhado ao Hospital Geral de Pedreira para atendimento especializado.
O usuário foi conduzido pela equipe do SAMU, permanecendo a ocorrência sem intercorrências adicionais até a saída da viatura do local às 03h41.
Ocorrência finalizada às 03h45.
Ciente: Sup. Fernanda Rocha – RE 228."

Escreva APENAS o relatório, sem markdown, sem asteriscos, sem títulos. Ao final: "Ocorrência finalizada às [horário]." e linha de cientes.`;

  const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":`Bearer ${apiKey}`},
    body:JSON.stringify({model:"llama-3.3-70b-versatile",messages:[{role:"user",content:prompt}],temperature:0.3,max_tokens:1200})
  });
  const data = await res.json();
  if(data.error) throw new Error(data.error.message);
  const text = data?.choices?.[0]?.message?.content;
  if(!text) throw new Error("Resposta vazia da API.");
  return text.replace(/\*\*/g,"").replace(/\*/g,"").replace(/^#+\s/gm,"").trim();
}

// ── Componentes base ─────────────────────────────────────────────────────────
function Inp({label,value,onChange,placeholder,type="text",hint}) {
  return (
    <div className="field">
      <label>{label}</label>
      {hint&&<span className="hint">{hint}</span>}
      <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder||label}/>
    </div>
  );
}
function TA({label,value,onChange,placeholder,rows=3,hint}) {
  return (
    <div className="field">
      <label>{label}</label>
      {hint&&<span className="hint">{hint}</span>}
      <textarea rows={rows} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder||label}/>
    </div>
  );
}
function Radio({label,value,options,onChange}) {
  return (
    <div className="field"><label>{label}</label>
      <div className="radio-group">
        {options.map(o=>(
          <button key={o.v} className={`radio-btn${o.danger?" danger":""}${value===o.v?" active":""}`} onClick={()=>onChange(o.v)} type="button">{o.l}</button>
        ))}
      </div>
    </div>
  );
}
function DList({items,onChange,fields,addLabel}) {
  const add=()=>onChange([...items,Object.fromEntries(fields.map(f=>[f.key,""]))]);
  const rem=i=>onChange(items.filter((_,idx)=>idx!==i));
  const upd=(i,k,v)=>{const a=[...items];a[i]={...a[i],[k]:v};onChange(a);};
  const cols=fields.length===2?"1fr 1fr":"1fr 1fr 1fr";
  return (
    <div className="dynamic-list">
      {items.map((item,i)=>(
        <div key={i} className="list-item">
          <div className="list-item-header">
            <span>#{i+1}</span>
            {items.length>1&&<button className="remove-btn" onClick={()=>rem(i)} type="button">✕</button>}
          </div>
          <div className="list-item-fields" style={{gridTemplateColumns:cols}}>
            {fields.map(f=>(
              <div className="field" key={f.key}>
                <label>{f.label}</label>
                <input type="text" value={item[f.key]||""} onChange={e=>upd(i,f.key,e.target.value)} placeholder={f.ph||f.label}/>
              </div>
            ))}
          </div>
        </div>
      ))}
      <button className="add-btn" onClick={add} type="button">+ {addLabel}</button>
    </div>
  );
}
function Toast({msg}) { return <div className="toast">{msg}</div>; }

// ── Modal histórico ──────────────────────────────────────────────────────────
function ModalRelatorio({item,onClose}) {
  const [texto,setTexto] = useState(item.relatorio);
  const [toast,setToast] = useState("");
  const mostrarToast = msg => { setToast(msg); setTimeout(()=>setToast(""),2000); };
  const copiar = async () => {
    const ok = await copiarTexto(texto);
    mostrarToast(ok?"✓ Texto copiado!":"Selecione e copie manualmente");
  };
  const exportPDF = () => {
    const w = window.open("","_blank");
    w.document.write(`<html><head><meta charset="UTF-8"/><style>body{font-family:'Times New Roman',serif;font-size:12pt;line-height:1.8;color:#000;padding:40px;}h2{font-size:14pt;text-align:center;margin-bottom:4px;}.sub{text-align:center;font-size:11pt;color:#444;margin-bottom:24px;border-bottom:1px solid #000;padding-bottom:12px;}p{white-space:pre-wrap;text-align:justify;}</style></head><body><h2>${item.terminal||"Relatório de Ocorrência"}</h2><div class="sub">Data: ${item.data} — Usuário: ${item.nomeUsuario}</div><p>${texto}</p></body></html>`);
    w.document.close(); w.focus(); setTimeout(()=>w.print(),400);
  };
  return (
    <div className="modal-overlay" onClick={onClose}>
      {toast&&<Toast msg={toast}/>}
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <span className="modal-title">{item.terminal||"RELATÓRIO"} — {item.data}</span>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div style={{fontSize:13,color:"#5a6278",marginBottom:12,fontFamily:"'IBM Plex Mono',monospace"}}>
          Usuário: {item.nomeUsuario}{item.inconsciente&&<span style={{color:"#ff8888"}}> · ⚠ Inconsciente</span>}
        </div>
        <div className="relatorio-edit-wrap">
          <textarea className="relatorio-textarea" value={texto} onChange={e=>setTexto(e.target.value)}/>
          <span className="edit-badge">editável</span>
        </div>
        <div className="action-bar">
          <button className="btn-pdf" onClick={exportPDF}>⬇ Exportar PDF</button>
          <button className="btn-copy" onClick={copiar}>Copiar texto</button>
        </div>
      </div>
    </div>
  );
}

// ── Tela histórico ───────────────────────────────────────────────────────────
function TelaHistorico({onNova}) {
  const [lista,setLista] = useState(carregarHistorico());
  const [modal,setModal] = useState(null);
  const deletar = (id,e) => {
    e.stopPropagation();
    if(!window.confirm("Excluir esta ocorrência?")) return;
    const nova = lista.filter(i=>i.id!==id);
    setLista(nova); salvarHistorico(nova);
  };
  const limpar = () => {
    if(!window.confirm("Limpar todo o histórico?")) return;
    setLista([]); salvarHistorico([]);
  };
  return (
    <>
      {modal&&<ModalRelatorio item={modal} onClose={()=>setModal(null)}/>}
      <div className="card">
        <div className="card-title">Histórico de Ocorrências</div>
        {lista.length===0
          ? <div className="hist-vazio">Nenhuma ocorrência salva ainda.<br/>Gere um relatório para começar.</div>
          : <>
              <div className="hist-count">{lista.length} ocorrência{lista.length!==1?"s":""} salva{lista.length!==1?"s":""}</div>
              {[...lista].reverse().map(item=>(
                <div key={item.id} className="hist-item">
                  <div className="hist-item-header">
                    <div className="hist-item-nome">{item.nomeUsuario}</div>
                    <div className="hist-item-data">{item.data}</div>
                  </div>
                  <div className="hist-item-meta">
                    {item.terminal&&<span>📍 {item.terminal} · </span>}
                    <span>🕐 {item.horario} · </span>
                    <span>📌 {item.local}</span>
                    {item.inconsciente&&<span style={{color:"#ff8888"}}> · ⚠ Inconsciente</span>}
                  </div>
                  <div className="hist-item-actions">
                    <button className="btn-hist-ver" onClick={()=>setModal(item)}>Ver / Editar</button>
                    <button className="btn-hist-del" onClick={e=>deletar(item.id,e)}>Excluir</button>
                  </div>
                </div>
              ))}
              <div style={{marginTop:16,textAlign:"right"}}>
                <button className="btn-reset" onClick={limpar}>Limpar histórico</button>
              </div>
            </>
        }
      </div>
      <div style={{textAlign:"center"}}>
        <button className="btn btn-primary" onClick={onNova}>+ Nova Ocorrência</button>
      </div>
    </>
  );
}

// ── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [tela,setTela] = useState("form");
  const [step,setStep] = useState(0);
  const [form,setForm] = useState(emptyForm());
  const [loading,setLoading] = useState(false);
  const [relatorio,setRelatorio] = useState("");
  const [erro,setErro] = useState("");
  const [toast,setToast] = useState("");
  const [apiKey,setApiKey] = useState(localStorage.getItem(GROQ_KEY)||"");
  const [showKey,setShowKey] = useState(!localStorage.getItem(GROQ_KEY));
  const [terminal,setTerminal] = useState(localStorage.getItem(TERM_KEY)||"");

  useEffect(()=>{ if(terminal) localStorage.setItem(TERM_KEY,terminal); },[terminal]);

  const mostrarToast = msg => { setToast(msg); setTimeout(()=>setToast(""),2200); };
  const s = k => v => setForm(f=>({...f,[k]:v}));
  const saveKey = () => { localStorage.setItem(GROQ_KEY,apiKey); setShowKey(false); };
  const inconsciente = form.consciente === "nao";

  const copiar = async () => {
    const ok = await copiarTexto(relatorio);
    mostrarToast(ok?"✓ Texto copiado!":"Selecione e copie manualmente");
  };

  const exportPDF = () => {
    const w = window.open("","_blank");
    w.document.write(`<html><head><meta charset="UTF-8"/><style>body{font-family:'Times New Roman',serif;font-size:12pt;line-height:1.8;color:#000;padding:40px;}h2{font-size:14pt;text-align:center;margin-bottom:4px;}.sub{text-align:center;font-size:11pt;color:#444;margin-bottom:24px;border-bottom:1px solid #000;padding-bottom:12px;}p{white-space:pre-wrap;text-align:justify;}</style></head><body><h2>${terminal||"Relatório de Ocorrência"}</h2><div class="sub">Usuário: ${form.nomeUsuario} — ${new Date().toLocaleString("pt-BR")}</div><p>${relatorio}</p></body></html>`);
    w.document.close(); w.focus(); setTimeout(()=>w.print(),400);
  };

  const canNext = () => {
    if(step===0) return form.horarioOcorrencia && form.nomeUsuario && form.localOcorrencia;
    if(step===1) return form.situacaoUsuario;
    if(step===2) return form.equipe[0]?.nome;
    return true;
  };

  const gerar = async () => {
    if(!apiKey){ setShowKey(true); return; }
    setLoading(true); setErro(""); setRelatorio("");
    try {
      const texto = await gerarComGroq(apiKey,form,terminal);
      setRelatorio(texto);
      const hist = carregarHistorico();
      hist.push({ id:Date.now(), data:new Date().toLocaleString("pt-BR"), nomeUsuario:form.nomeUsuario, horario:form.horarioOcorrencia, local:form.localOcorrencia, terminal, relatorio:texto, inconsciente });
      salvarHistorico(hist);
    } catch(e) { setErro("Erro: "+e.message); }
    setLoading(false);
  };

  const next = () => {
    if(step===4){ setStep(5); setTimeout(gerar,100); }
    else setStep(s=>s+1);
  };

  const nova = () => { setStep(0); setForm(emptyForm()); setRelatorio(""); setErro(""); setTela("form"); };

  return (
    <div className="app">
      {toast&&<Toast msg={toast}/>}
      <div className="header">
        <div className="header-top">
          <div>
            <div className="header-badge"><span className="dot"/> Sistema Ativo</div>
            <h1>Agente de <span>Ocorrências</span></h1>
            <p className="subtitle">// Gerador de relatórios de mal súbito • Terminal</p>
          </div>
          <button className={`btn-historico${tela==="historico"?" ativo":""}`} onClick={()=>setTela(t=>t==="historico"?"form":"historico")}>
            {tela==="historico"?"← Voltar":"📋 Histórico"}
          </button>
        </div>
      </div>

      <div className="terminal-bar">
        <label>Terminal</label>
        <input type="text" value={terminal} onChange={e=>setTerminal(e.target.value)} placeholder="Ex: Terminal Jabaquara"/>
      </div>

      {tela==="form" && (showKey ? (
        <div className="api-key-box">
          <div className="card-title">Chave da API — Groq</div>
          <p>Obtenha sua chave <strong>gratuita</strong> em:<br/><a href="https://console.groq.com/keys" target="_blank">console.groq.com/keys</a><br/><br/>Crie uma conta → <strong>"Create API Key"</strong> → cole abaixo.</p>
          <div className="key-row">
            <input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="gsk_..."/>
            <button className="btn-save" onClick={saveKey} disabled={apiKey.length<10}>Salvar</button>
          </div>
        </div>
      ) : (
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
          <span className="groq-badge">⚡ Groq — LLaMA 3.3 70B</span>
          <button className="key-change" onClick={()=>setShowKey(true)}>🔑 Alterar chave</button>
        </div>
      ))}

      {tela==="historico"&&<TelaHistorico onNova={nova}/>}

      {tela==="form"&&<>
        <div className="step-nav">
          {STEPS.map((s,i)=>(
            <div key={i} className={`step-pill${i<step?" done":i===step?" active":""}`}>
              {i<step?"✓":`${i+1}`} {s}
            </div>
          ))}
        </div>

        {step===0&&(
          <div className="card">
            <div className="card-title">Dados do Usuário</div>
            <div className="row-2">
              <Inp label="Horário da Ocorrência *" value={form.horarioOcorrencia} onChange={s("horarioOcorrencia")} placeholder="Ex: 02h04"/>
              <Inp label="Idade" value={form.idadeUsuario} onChange={s("idadeUsuario")} placeholder="Ex: 67 anos"/>
            </div>
            <Inp label="Nome completo do usuário *" value={form.nomeUsuario} onChange={s("nomeUsuario")} placeholder="Nome completo"/>
            <div className="row-2">
              <Inp label="RG" value={form.rgUsuario} onChange={s("rgUsuario")} placeholder="00.000.000-0"/>
              <Inp label="CPF (não aparece no texto)" value={form.cpfUsuario} onChange={s("cpfUsuario")} placeholder="000.000.000-00"/>
            </div>
            <Inp label="Local da ocorrência *" value={form.localOcorrencia} onChange={s("localOcorrencia")} placeholder="Ex: Plataforma 03, próximo ao PMD 38"/>
            <Inp label="Como foi identificado / quem chamou ajuda" value={form.quemChamou} onChange={s("quemChamou")} placeholder="Ex: sofrer uma queda"/>
          </div>
        )}

        {step===1&&(
          <div className="card">
            <div className="card-title">Estado Clínico</div>
            <Radio
              label="Está consciente?"
              value={form.consciente}
              onChange={s("consciente")}
              options={[
                {v:"sim", l:"Sim — consciente"},
                {v:"nao", l:"Não — inconsciente", danger:true},
              ]}
            />
            {inconsciente&&(
              <div className="alerta-inconsciente">
                <strong>⚠ Usuário inconsciente</strong> — o relatório será adaptado automaticamente. Descreva apenas o que foi <strong>observado</strong> pelos colaboradores. O SAMU será indicado como acionamento imediato.
              </div>
            )}
            <TA
              label={inconsciente?"O que foi observado pelos colaboradores *":"Situação relatada / observada *"}
              value={form.situacaoUsuario}
              onChange={s("situacaoUsuario")}
              hint={inconsciente
                ?"Ex: ausência de resposta, respiração ofegante, palidez intensa"
                :"Ex: queixando-se de dores abdominais, desequilíbrio e sudorese"}
              rows={3}
            />
            {!inconsciente&&(
              <Inp label="Nível de consciência (opcional)" value={form.nivelConsciente} onChange={s("nivelConsciente")} placeholder="Ex: orientado, confuso, sonolento"/>
            )}
            <Inp label="Sinais vitais (deixe em branco se não foram aferidos)" value={form.sinaisVitais} onChange={s("sinaisVitais")} placeholder="Ex: PA 130/90, FC 88bpm, SpO2 96%"/>
            <Radio label="Necessita cadeira de rodas?" value={form.precisaCadeira} onChange={s("precisaCadeira")} options={[{v:"sim",l:"Sim"},{v:"nao",l:"Não"}]}/>
            {!inconsciente&&(
              <Radio label="Aceitou ser conduzido ao pronto-socorro?" value={form.aceitaConducao} onChange={s("aceitaConducao")} options={[{v:"sim",l:"Sim"},{v:"nao",l:"Não"},{v:"na",l:"N/A"}]}/>
            )}
            <Inp label="Hospital / UPA de destino" value={form.hospitalDestino} onChange={s("hospitalDestino")} placeholder="Ex: UPA Santo Amaro"/>
          </div>
        )}

        {step===2&&(
          <div className="card">
            <div className="card-title">Equipe de Atendimento</div>
            <DList items={form.equipe} onChange={s("equipe")} addLabel="Adicionar colaborador"
              fields={[
                {key:"cargo",label:"Cargo",ph:"Ex: Vigilante, OTU, CAM"},
                {key:"nome",label:"Nome",ph:"Nome completo"},
                {key:"re",label:"RE",ph:"Ex: 4520"},
              ]}/>
          </div>
        )}

        {step===3&&(
          <div className="card">
            <div className="card-title">SAMU</div>
            {inconsciente&&(
              <div className="alerta-inconsciente" style={{marginBottom:16}}>
                <strong>⚠ Usuário inconsciente</strong> — acionamento do SAMU é obrigatório neste caso.
              </div>
            )}
            <Radio label="SAMU foi solicitado?" value={form.samuSolicitado} onChange={s("samuSolicitado")} options={[{v:"sim",l:"Sim"},{v:"nao",l:"Não"}]}/>
            {form.samuSolicitado==="sim"&&(
              <div className="samu-section">
                <div className="row-2">
                  <Inp label="Horário do contato" value={form.horarioSamuContato} onChange={s("horarioSamuContato")} placeholder="Ex: 02h08"/>
                  <Inp label="Atendente SAMU" value={form.atendenteSamu} onChange={s("atendenteSamu")} placeholder="Nome da atendente"/>
                </div>
                <Inp label="Número do protocolo" value={form.protocoloSamu} onChange={s("protocoloSamu")} placeholder="Ex: 20260694054"/>
                <div className="row-2">
                  <Inp label="Horário de chegada" value={form.horarioChegadaSamu} onChange={s("horarioChegadaSamu")} placeholder="Ex: 02h48"/>
                  <Inp label="Horário de saída" value={form.horarioSaidaSamu} onChange={s("horarioSaidaSamu")} placeholder="Ex: 02h54"/>
                </div>
                <div className="row-2">
                  <Inp label="Placa da ambulância" value={form.placaAmbu} onChange={s("placaAmbu")} placeholder="Ex: DJM-5625"/>
                  <Inp label="Prefixo" value={form.prefixoAmbu} onChange={s("prefixoAmbu")} placeholder="Ex: AM-0945"/>
                </div>
                <div style={{marginTop:16}}>
                  <div className="field"><label>Equipe do SAMU</label></div>
                  <DList items={form.equipeSamu} onChange={s("equipeSamu")} addLabel="Adicionar membro"
                    fields={[
                      {key:"funcao",label:"Função",ph:"Ex: Médico, Enfermeira"},
                      {key:"nome",label:"Nome",ph:"Nome completo"},
                      {key:"recrea",label:"RE / CREA",ph:"Ex: 23.633.229-06"},
                    ]}/>
                </div>
              </div>
            )}
          </div>
        )}

        {step===4&&(
          <div className="card">
            <div className="card-title">Desfecho & Cientes</div>
            <Inp label="Horário de finalização" value={form.horarioFinalizacao} onChange={s("horarioFinalizacao")} placeholder="Ex: 02h54"/>
            <TA label="Observações finais" value={form.observacoesFinais} onChange={s("observacoesFinais")} placeholder="Informações adicionais relevantes..."/>
            <div className="field" style={{marginTop:8}}><label>Cientes da ocorrência</label></div>
            <DList items={form.cientes} onChange={s("cientes")} addLabel="Adicionar ciente"
              fields={[
                {key:"cargo",label:"Cargo",ph:"Ex: E.T., Supervisor"},
                {key:"nome",label:"Nome",ph:"Nome completo"},
                {key:"re",label:"RE",ph:"Ex: 111"},
              ]}/>
          </div>
        )}

        {step===5&&(
          <div className="card">
            <div className="card-title">Relatório Final</div>
            {loading&&<div className="loading"><div className="spinner"/>Gerando relatório...</div>}
            {erro&&(
              <div className="erro">{erro}<br/><br/>
                <button className="btn-gerar" onClick={gerar} style={{marginTop:4}}>Tentar novamente</button>
              </div>
            )}
            {relatorio&&(
              <>
                <div className="relatorio-edit-wrap">
                  <textarea className="relatorio-textarea" value={relatorio} onChange={e=>setRelatorio(e.target.value)}/>
                  <span className="edit-badge">editável</span>
                </div>
                <div className="action-bar">
                  <button className="btn-reset" onClick={nova}>Nova ocorrência</button>
                  <button className="btn-reset" onClick={()=>setTela("historico")}>Ver histórico</button>
                  <button className="btn-pdf" onClick={exportPDF}>⬇ PDF</button>
                  <button className="btn-copy" onClick={copiar}>Copiar texto</button>
                </div>
              </>
            )}
            {!loading&&!relatorio&&!erro&&(
              <button className="btn-gerar" onClick={gerar}>⚡ Gerar Relatório com Groq</button>
            )}
          </div>
        )}

        {step<5&&(
          <div className="nav">
            <button className="btn btn-ghost" onClick={()=>setStep(s=>Math.max(0,s-1))} disabled={step===0}>← Voltar</button>
            <button className="btn btn-primary" onClick={next} disabled={!canNext()}>
              {step===4?"Gerar Relatório →":"Próximo →"}
            </button>
          </div>
        )}
      </>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
